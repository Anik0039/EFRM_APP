<header class="topbar">
  <div class="topbar-left">
    @if (showMenuToggle) {
      <button
        pButton
        type="button"
        icon="pi pi-bars"
        text
        rounded
        class="menu-btn"
        (click)="onToggleMenu()"
      ></button>
    }

    <span class="page-title">Enterprise Financial Risk Monitoring</span>
  </div>

  <div class="topbar-right">
    <!-- Notification Bell -->
    <div class="notif-wrapper" (click)="$event.stopPropagation()">
      <button class="notif-btn" (click)="toggleNotifications($event)" title="Notifications">
        <i class="pi pi-bell"></i>
        @if (unreadCount > 0) {
          <span class="notif-badge">{{ unreadCount }}</span>
        }
      </button>

      @if (showNotifications()) {
        <div class="notif-dropdown">
          <div class="notif-header">
            <span class="notif-title">Notifications</span>
            @if (unreadCount > 0) {
              <button class="notif-mark-all" (click)="markAllRead()">Mark all read</button>
            }
          </div>
          <div class="notif-list">
            @for (notif of notifications(); track notif.id) {
              <div
                class="notif-item"
                [class.unread]="!notif.read"
                (click)="markAsRead(notif)"
              >
                <div [class]="notif.iconClass">
                  <i [class]="notif.icon"></i>
                </div>
                <div class="notif-content">
                  <span class="notif-item-title">{{ notif.title }}</span>
                  <span class="notif-item-msg">{{ notif.message }}</span>
                  <span class="notif-item-time">{{ notif.time }}</span>
                </div>
                @if (!notif.read) {
                  <span class="notif-dot"></span>
                }
              </div>
            }
          </div>
        </div>
      }
    </div>

    <div class="user-info">
      <p-avatar [label]="avatarLabel" shape="circle"></p-avatar>
      <div class="user-meta">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>
    </div>

    <button
      pButton
      type="button"
      icon="pi pi-sign-out"
      text
      rounded
      (click)="logout()"
      title="Logout"
    ></button>
  </div>
</header>
